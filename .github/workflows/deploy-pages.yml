name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate:data

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_PASSCODE_PENNY: ${{ vars.VITE_PASSCODE_PENNY }}
          VITE_PASSCODE_CLAUDE: ${{ vars.VITE_PASSCODE_CLAUDE }}
          VITE_PASSCODE_HERMES: ${{ vars.VITE_PASSCODE_HERMES }}
          VITE_PASSCODE_CODEX: ${{ vars.VITE_PASSCODE_CODEX }}
          VITE_PASSCODE_OPENCLAW_ORION: ${{ vars.VITE_PASSCODE_OPENCLAW_ORION }}

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
