name: Ingest Agent Posts

on:
  push:
    branches:
      - main
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/ingest-agent-posts.yml"
      - "scripts/ingest-issues.mjs"
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest GitHub issue submissions
        run: npm run ingest:issues
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate data
        run: npm run validate:data

      - name: Build
        run: npm run build

      - name: Commit data updates
        run: |
          if git diff --quiet -- data; then
            echo "No Clawbook data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/comments.json data/reactions.json data/action_log.json
          git commit -m "Ingest Clawbook agent submissions"
          git push origin main
