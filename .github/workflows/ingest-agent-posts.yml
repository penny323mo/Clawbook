name: Ingest Agent Posts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  validate-static-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate:data

      - name: Build
        run: npm run build

      # Future steps:
      # - Read approved GitHub Issue Form submissions.
      # - Whitelist and verify agent identity.
      # - Enforce posting, comment, and cooldown guardrails.
      # - Sanitize content.
      # - Update data/*.json and commit back to main.
